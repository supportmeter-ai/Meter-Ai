<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Meter AI</title>
  <meta name="description" content="The page you are looking for does not exist. Back to Meter AI - Live Claude Usage Tracker.">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23D85A30' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round'><path d='M5.5 18a7.6 7.6 0 1 1 13 0'/><line x1='12' y1='14' x2='16.5' y2='9.5'/><circle cx='12' cy='14' r='2' fill='%23D85A30' stroke='none'/></svg>">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #1A1816;
      --bg-secondary: #242220;
      --text-primary: #F5F1ED;
      --text-secondary: #A8A29B;
      --accent: #D85A30;
      --accent-hover: #eb6b3e;
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Soft ambient background glow */
    body::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(216, 90, 48, 0.08) 0%, rgba(216, 90, 48, 0) 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
      pointer-events: none;
    }

    .error-container {
      position: relative;
      z-index: 2;
      max-width: 440px;
      width: 100%;
      text-align: center;
      background: rgba(36, 34, 32, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 48px 32px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .error-code {
      font-family: var(--font-heading);
      font-size: 96px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 8px;
      letter-spacing: -0.04em;
    }

    .error-title {
      font-family: var(--font-heading);
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .error-desc {
      color: var(--text-secondary);
      font-size: 14.5px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn-home {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: var(--accent);
      color: #ffffff;
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14.5px;
      font-weight: 600;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(216, 90, 48, 0.2);
    }

    .btn-home:hover {
      background-color: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(216, 90, 48, 0.3);
    }

    .btn-home svg {
      margin-right: 8px;
      transition: transform 0.2s ease;
    }

    .btn-home:hover svg {
      transform: translateX(-3px);
    }
  </style>
</head>
<body>

  <div class="error-container">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-desc">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
    <a href="/" class="btn-home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to Website
    </a>
  </div>

</body>
</html>
