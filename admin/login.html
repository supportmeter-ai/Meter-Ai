<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meter AI — Admin Workspace</title>
  <!-- Google Fonts: IBM Plex Sans & Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #1A1816; /* Obsidian Charcoal */
      --bg-secondary: #242220; /* Panel surface background */
      --bg-card: #2C2926; /* Card background */
      --border: rgba(255, 255, 255, 0.06); /* Hairline borders */
      --text-primary: #F5F1ED; /* Warm Paper */
      --text-secondary: #A8A29B; /* Elegant Gray */
      --text-muted: #6E6861;
      --accent: #D85A30; /* Rust Orange */
      --accent-hover: #eb6b3e;
      --error-bg: rgba(226, 75, 74, 0.1);
      --error-border: rgba(226, 75, 74, 0.2);
      --error-text: #E24B4A;
      --font-heading: 'Outfit', sans-serif;
      --font-body: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Blurred Batman Background Image */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url('/assets/batman-bg.png') no-repeat center center;
      background-size: cover;
      filter: blur(12px) brightness(0.25); /* Blurred and dimmed for accessibility and premium dark contrast */
      z-index: 1;
      pointer-events: none;
      transform: scale(1.06); /* prevent blur edge bleed artifacts */
    }

    .login-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .brand-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand-title {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 38px;
      letter-spacing: -0.04em;
      color: var(--text-primary);
      text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .brand-title .accent-text {
      color: var(--accent);
    }

    .brand-subtitle {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-top: 6px;
    }

    .login-card {
      width: 100%;
      background: rgba(36, 34, 32, 0.85); /* Translucent panel box blending with backdrop */
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 36px 30px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .input-container {
      position: relative;
      width: 100%;
      display: flex;
      align-items: center;
    }

    .input-icon-left {
      position: absolute;
      left: 14px;
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .input-field {
      width: 100%;
      background: rgba(26, 24, 22, 0.7);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px 12px 42px; /* left padding for icons */
      font-size: 14px;
      color: var(--text-primary);
      outline: none;
      transition: all 0.2s ease;
      font-family: var(--font-body);
    }

    .input-field::placeholder {
      color: rgba(245, 241, 237, 0.25); /* Muted placeholder style */
    }

    .input-field:focus {
      border-color: rgba(216, 90, 48, 0.5);
      box-shadow: 0 0 0 3px rgba(216, 90, 48, 0.12);
      background: rgba(26, 24, 22, 0.9);
    }

    /* Password visibility toggle button */
    .password-toggle {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .password-toggle svg {
      width: 16px;
      height: 16px;
      transition: color 0.2s ease;
    }

    .password-toggle:hover svg {
      color: var(--text-primary);
    }

    .btn-submit {
      width: 100%;
      background: var(--accent);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
      font-family: var(--font-body);
    }

    .btn-submit:hover {
      background: var(--accent-hover);
    }

    .btn-submit:disabled {
      background: rgba(216, 90, 48, 0.4);
      cursor: not-allowed;
    }

    .error-alert {
      display: none;
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: 6px;
      padding: 10px 14px;
      color: var(--error-text);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      align-items: center;
      gap: 8px;
      animation: shake 0.4s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .back-link:hover {
      color: var(--text-secondary);
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    <div class="brand-header">
      <div class="brand-title">Meter<span class="accent-text">AI</span></div>
      <div class="brand-subtitle">Admin Panel</div>
    </div>

    <div class="login-card">
      <div class="error-alert" id="errorAlert">
        <span style="font-size: 14px;">⚠️</span>
        <span id="errorMessage">Invalid credentials. Access denied.</span>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <div class="input-container">
            <svg class="input-icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
            <input class="input-field" type="email" id="email" required autocomplete="email" placeholder="admin@meterai.com">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-container">
            <svg class="input-icon-left" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input class="input-field" type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            <button type="button" class="password-toggle" id="togglePassword" aria-label="Toggle Password Visibility">
              <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="btn-submit" type="submit" id="submitBtn">Sign In</button>
      </form>
    </div>

    <a href="/" class="back-link">← Go to public website</a>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorAlert = document.getElementById('errorAlert');
    const errorMessage = document.getElementById('errorMessage');
    
    // Toggle Password Visibility Logic
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    togglePassword.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      
      // Toggle eye SVG paths
      if (type === 'password') {
        eyeIcon.innerHTML = `<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>`;
      } else {
        eyeIcon.innerHTML = `<path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.52 13.52 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/>`;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      errorAlert.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.innerText = 'Verifying...';

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (res.ok && data.success) {
          window.location.href = '/admin/';
        } else {
          showError(data.error || 'Authentication failed. Please try again.');
        }
      } catch (err) {
        showError('Network error. Check connection or console logs.');
        console.error('Login error:', err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = 'Sign In';
      }
    });

    function showError(msg) {
      errorMessage.innerText = msg;
      errorAlert.style.display = 'flex';
      // Reset animation
      errorAlert.style.animation = 'none';
      errorAlert.offsetHeight; /* trigger reflow */
      errorAlert.style.animation = null;
    }
  </script>
</body>
</html>
